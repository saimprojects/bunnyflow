kind = "web"
previewPath = "/"
title = "BunnyFlow Platform"
version = "1.0.0"
id = "artifacts/flow-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18990

[services.development]
run = "pnpm --filter @workspace/flow-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flow-platform", "run", "build" ]
publicDir = "artifacts/flow-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18990"
BASE_PATH = "/"
