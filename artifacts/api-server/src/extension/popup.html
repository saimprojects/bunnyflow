<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>BunnyFlow</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:#080810;color:#f0f0f0;width:320px;min-height:200px}
    .header{background:linear-gradient(135deg,#0f0f1a 0%,#130d20 100%);padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(124,58,237,0.2)}
    .logo{width:34px;height:34px;background:linear-gradient(135deg,#6366f1,#7c3aed,#a855f7);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 2px 10px rgba(99,102,241,0.45);flex-shrink:0}
    .brand-name{font-size:15px;font-weight:700;background:linear-gradient(130deg,#c4b5fd,#a5b4fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.3px}
    .brand-sub{font-size:10px;color:#6b7280;margin-top:1px}
    .version-pill{margin-left:auto;background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.3);color:#a78bfa;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px}
    .content{padding:14px 16px}
    #loading-screen{text-align:center;padding:28px 16px}
    .spinner{width:28px;height:28px;border-radius:50%;border:2px solid rgba(99,102,241,0.2);border-top-color:#6366f1;animation:spin 0.8s linear infinite;margin:0 auto 10px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .not-connected-header{text-align:center;padding:16px 0 12px}
    .lock-emoji{font-size:32px;margin-bottom:6px}
    .not-connected-header h3{font-size:15px;font-weight:700;color:#fff;margin-bottom:4px}
    .not-connected-header p{font-size:12px;color:#6b7280;line-height:1.5}
    .error-box{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);border-radius:8px;padding:8px 10px;font-size:12px;color:#f87171;margin-bottom:10px;display:none}
    .form-group{margin-bottom:10px}
    .form-label{display:block;font-size:10px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px}
    .form-input{width:100%;padding:9px 11px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#f0f0f0;font-size:13px;outline:none;transition:border-color 0.2s}
    .form-input:focus{border-color:rgba(99,102,241,0.5);background:rgba(99,102,241,0.06)}
    .form-input::placeholder{color:#374151}
    .api-row{display:flex;gap:6px}
    .api-row .form-input{flex:1;font-size:11px}
    .btn-save{padding:0 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#9ca3af;font-size:11px;cursor:pointer;white-space:nowrap;transition:all 0.2s}
    .btn-save:hover{background:rgba(255,255,255,0.08);color:#fff}
    .btn{width:100%;padding:10px;border-radius:9px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;text-align:center}
    .btn-primary{background:linear-gradient(135deg,#6366f1,#7c3aed,#a855f7);color:#fff;box-shadow:0 2px 12px rgba(99,102,241,0.38)}
    .btn-primary:hover{opacity:0.88;transform:translateY(-1px)}
    .btn-secondary{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#6b7280;margin-top:7px}
    .btn-secondary:hover{background:rgba(255,255,255,0.07);color:#9ca3af}
    .btn-inject{background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);color:#a78bfa;margin-bottom:7px;display:none}
    .btn-inject:hover{background:rgba(99,102,241,0.18)}
    .auto-badge{display:none;align-items:center;gap:6px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:20px;padding:5px 10px;font-size:11px;color:#4ade80;margin-bottom:12px;width:fit-content}
    .auto-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;box-shadow:0 0 5px #22c55e;flex-shrink:0}
    .disabled-banner{display:none;align-items:center;gap:8px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:8px 10px;font-size:11px;color:#f87171;margin-bottom:10px}
    .user-card{background:rgba(99,102,241,0.07);border:1px solid rgba(99,102,241,0.18);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .user-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(99,102,241,0.35)}
    .user-name{font-size:14px;font-weight:600;color:#fff}
    .user-plan{font-size:11px;color:#a78bfa;margin-top:2px;font-weight:500}
    .plan-days{font-size:10px;color:rgba(255,255,255,0.38);margin-top:3px;display:none}
    .plan-days.warn{color:#f87171}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
    .stat-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:12px}
    .stat-val{font-size:20px;font-weight:800;color:#a78bfa;letter-spacing:-0.5px}
    .stat-lbl{font-size:10px;color:#4b5563;margin-top:3px;text-transform:uppercase;letter-spacing:0.05em}
    .page-pill{display:flex;align-items:center;gap:7px;padding:8px 12px;border-radius:9px;font-size:12px;font-weight:500;margin-bottom:10px;border:1px solid}
    .page-pill.inactive{background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.07);color:#6b7280}
    .page-pill.active{background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.2);color:#4ade80}
    .page-pill.whisk{background:rgba(249,115,22,0.08);border-color:rgba(249,115,22,0.3);color:#fb923c}
    .pill-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
    .footer{border-top:1px solid rgba(255,255,255,0.05);padding:9px 16px;display:flex;justify-content:space-between;align-items:center}
    .footer a{font-size:11px;color:#374151;text-decoration:none;cursor:pointer;transition:color 0.2s}
    .footer a:hover{color:#a78bfa}
  </style>
</head>
<body>
<div class="header">
  <div class="logo" style="background:none;padding:0;overflow:hidden;border-radius:50%"><img src="icon128.png" alt="BunnyFlow" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/></div>
  <div>
    <div class="brand-name">BunnyFlow</div>
    <div class="brand-sub">AI Video Platform</div>
  </div>
  <span class="version-pill">v3.6.0</span>
</div>
<div id="loading-screen" class="content">
  <div class="spinner"></div>
  <div style="font-size:12px;color:#6b7280">Loading...</div>
</div>
<div id="login-screen" class="content" style="display:none">
  <div class="not-connected-header">
    <div class="lock-emoji">🔒</div>
    <h3>Not Connected</h3>
    <p>Log into BunnyFlow to activate automatic session injection on Google Flow.</p>
  </div>
  <div id="login-error" class="error-box"></div>
  <div class="form-group"><label class="form-label">Email</label><input id="login-email" type="email" class="form-input" placeholder="your@email.com"/></div>
  <div class="form-group"><label class="form-label">Password</label><input id="login-password" type="password" class="form-input" placeholder="••••••••"/></div>
  <div class="form-group"><label class="form-label">Server URL</label><div class="api-row"><input id="api-base" type="text" class="form-input" placeholder=""/><button id="save-api" class="btn-save">Save</button></div></div>
  <button id="login-btn" class="btn btn-primary">Sign In</button>
</div>
<div id="status-screen" class="content" style="display:none">
  <div id="disabled-banner" class="disabled-banner"><span style="font-size:15px">⚠</span><span>Session system disabled by admin.</span></div>
  <div id="auto-badge" class="auto-badge"><div class="auto-dot"></div>Auto-connected from BunnyFlow</div>
  <div class="user-card">
    <div id="user-avatar" class="user-avatar">?</div>
    <div>
      <div id="user-name" class="user-name">—</div>
      <div id="user-plan" class="user-plan">—</div>
      <div id="plan-days" class="plan-days">—</div>
    </div>
  </div>
  <div class="stats-grid"><div class="stat-card"><div id="credits-left" class="stat-val">—</div><div class="stat-lbl">Days Left</div></div><div class="stat-card"><div id="cookies-count" class="stat-val">—</div><div class="stat-lbl">Session Cookies</div></div></div>
  <div id="page-indicator" class="page-pill inactive"><div class="pill-dot"></div><span id="page-text">Not on Google Flow</span></div>
  <button id="inject-btn" class="btn btn-inject">↺ Re-inject Session</button>
  <button id="logout-btn" class="btn btn-secondary">Disconnect</button>
</div>
<div class="footer">
  <a href="#" id="footer-dashboard" target="_blank">Dashboard</a>
  <a href="#" id="footer-extension" target="_blank">Get Extension</a>
</div>
<script src="popup.js"></script>
<script src="popup_extra.js"></script>

</body>
</html>
